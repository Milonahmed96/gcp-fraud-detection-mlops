# Deploy to Cloud Run on merge to main.
#
# Authentication is Workload Identity Federation: GitHub Actions presents its
# OIDC token and GCP mints short-lived credentials. There is no service-account
# JSON key in this repository, in GitHub secrets, or anywhere else.
#
# The deploy is safe by construction. Both new revisions go up with --no-traffic,
# are smoke-tested on their own tagged URLs, and only then receive traffic. If a
# smoke test fails the job stops and the previous revision keeps serving 100% --
# no rollback step is needed because traffic never moved.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      xgboost_traffic:
        description: "Percent of traffic to the XGBoost variant (rest goes to LightGBM)"
        required: false
        default: "50"

concurrency:
  group: deploy-main # never let two deploys race for the same traffic split
  cancel-in-progress: false

env:
  INFERENCE_SERVICE: fraud-inference-api
  MONITOR_SERVICE: fraud-drift-monitor
  SCHEDULER_JOB: fraud-drift-check

jobs:
  # main never deploys code that has not passed the same gate a PR does.
  verify:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Cloud Run
    needs: verify
    runs-on: ubuntu-latest
    environment: production

    # Skip cleanly when the project has not been bootstrapped yet, rather than
    # failing at the auth step. Run infrastructure/setup_gcp.sh and set the
    # repository variables to enable deploys. `verify` still runs on every push
    # to main, so main is always known-good even before GCP exists.
    if: vars.GCP_PROJECT_ID != ''

    permissions:
      contents: read
      id-token: write # required to mint the OIDC token for WIF

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Buildx
        # Required for `cache-to: type=gha`; the default docker driver cannot
        # export a build cache.
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra gcp

      - name: Train the models
        # Artefacts are baked into the image, so a revision's model is immutable
        # and pinned to its image tag. Reproducing a prediction means pulling
        # the tag, not guessing which model was live.
        run: uv run python -m src.training.train --backend local

      - name: Set image tags
        id: tags
        run: |
          REGISTRY="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}"
          echo "inference=${REGISTRY}/${INFERENCE_SERVICE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "monitor=${REGISTRY}/${MONITOR_SERVICE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push the inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.inference }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push the monitoring image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.monitoring
          push: true
          tags: ${{ steps.tags.outputs.monitor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Inference: one revision per A/B variant, neither taking traffic yet ---

      - name: Decide whether --no-traffic applies
        id: traffic
        # `--no-traffic` is rejected when *creating* a service:
        #   ERROR: --no-traffic not supported when creating a new service.
        # That is fine, and safe: a service that does not exist has no live
        # revision to protect, so nothing can be broken by the first one
        # serving. On every subsequent deploy the flag applies and the
        # smoke-test-before-traffic guarantee holds.
        run: |
          if gcloud run services describe "${INFERENCE_SERVICE}" \
               --region="${{ vars.GCP_REGION }}" >/dev/null 2>&1; then
            echo "flag=--no-traffic" >> "$GITHUB_OUTPUT"
            echo "existing service — new revisions will take no traffic until smoke-tested"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "first deploy — creating the service; no live revision exists to protect"
          fi

      - name: Deploy the XGBoost revision
        run: |
          gcloud run deploy "${INFERENCE_SERVICE}" \
            --image="${{ steps.tags.outputs.inference }}" \
            --region="${{ vars.GCP_REGION }}" \
            --revision-suffix="xgb-${GITHUB_SHA::7}" \
            --set-env-vars="SERVING_VARIANT=xgboost" \
            --tag=xgb \
            ${{ steps.traffic.outputs.flag }} \
            --no-allow-unauthenticated \
            --memory=2Gi --cpu=2 --concurrency=40 --min-instances=0 --max-instances=10 \
            --quiet

      - name: Deploy the LightGBM revision (no traffic)
        # The service certainly exists by now, so this one is always --no-traffic.
        run: |
          gcloud run deploy "${INFERENCE_SERVICE}" \
            --image="${{ steps.tags.outputs.inference }}" \
            --region="${{ vars.GCP_REGION }}" \
            --revision-suffix="lgbm-${GITHUB_SHA::7}" \
            --set-env-vars="SERVING_VARIANT=lightgbm" \
            --tag=lgbm \
            --no-traffic \
            --no-allow-unauthenticated \
            --memory=2Gi --cpu=2 --concurrency=40 --min-instances=0 --max-instances=10 \
            --quiet

      - name: Resolve the tagged revision URLs
        id: urls
        # Each --tag gives the revision its own hostname that receives no
        # production traffic. `jq -er` exits non-zero if a tag is missing.
        run: |
          set -euo pipefail
          SERVICE_JSON="$(gcloud run services describe "${INFERENCE_SERVICE}" \
            --region="${{ vars.GCP_REGION }}" --format=json)"

          BASE="$(echo "${SERVICE_JSON}" | jq -er '.status.url')"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "base -> ${BASE}"

          for VARIANT in xgb lgbm; do
            URL="$(echo "${SERVICE_JSON}" | jq -er --arg tag "${VARIANT}" \
              '.status.traffic[] | select(.tag == $tag) | .url')"
            echo "${VARIANT}=${URL}" >> "$GITHUB_OUTPUT"
            echo "${VARIANT} -> ${URL}"
          done

      # An ID token is minted per audience, and Cloud Run requires the audience
      # to be the exact URL being called -- hence one auth step per revision.
      #
      # NOT `gcloud auth print-identity-token --impersonate-service-account`:
      # that self-impersonation path fails under Workload Identity Federation.
      # `google-github-actions/auth` asks Google's STS for an ID token directly,
      # which is the supported mechanism. Found on the first real deploy.
      - name: Mint an ID token for the xgb revision
        id: idtoken_xgb
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.urls.outputs.xgb }}
          id_token_include_email: true

      # ---------------------------------------------------------------------
      # TEMPORARY DIAGNOSTIC. Delete once we know which audience Cloud Run
      # accepts for a *tagged* revision URL. Cloud Run answered 401 -- "the
      # access token could not be verified" -- to a token minted for the tagged
      # URL, which is an authentication failure, not authorisation
      # (roles/run.admin already includes run.routes.invoke).
      #
      # Prints HTTP status codes only. Never echoes a token.
      # ---------------------------------------------------------------------
      - name: DIAGNOSTIC — mint an ID token for the BASE service url
        id: idtoken_base
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.urls.outputs.base }}
          id_token_include_email: true

      - name: DIAGNOSTIC — which audience does Cloud Run accept?
        run: |
          # Deliberately NOT `set -e`: both probes must run even if one 401s.
          set -uo pipefail
          TAGGED="${{ steps.urls.outputs.xgb }}"
          echo "probing ${TAGGED}/health"

          probe() {
            CODE="$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $2" "${TAGGED}/health")"
            echo "  audience=$1 -> HTTP ${CODE}"
          }
          probe "tagged" "${{ steps.idtoken_xgb.outputs.id_token }}"
          probe "base  " "${{ steps.idtoken_base.outputs.id_token }}"

          NO_TOKEN="$(curl -s -o /dev/null -w '%{http_code}' "${TAGGED}/health")"
          echo "  no token      -> HTTP ${NO_TOKEN}  (expect 401/403: the service is private)"

      - name: Smoke-test the xgb revision before it sees a customer
        # If this fails the job stops and the previous revision keeps serving
        # 100%. The ordering IS the rollback strategy.
        #
        # The diagnostic above decides which token belongs here. Until then we
        # try the base-audience token, falling back to the tagged-audience one.
        run: |
          set -uo pipefail
          URL="${{ steps.urls.outputs.xgb }}/health"

          for TOKEN in "${{ steps.idtoken_base.outputs.id_token }}" \
                       "${{ steps.idtoken_xgb.outputs.id_token }}"; do
            BODY="$(curl -s --retry 5 --retry-delay 3 --retry-connrefused \
              -H "Authorization: Bearer ${TOKEN}" "${URL}")"
            if echo "${BODY}" | grep -q '"status":"ok"'; then
              echo "${BODY}"
              echo "smoke test passed"
              exit 0
            fi
          done
          echo "smoke test FAILED: no audience produced a healthy response" >&2
          exit 1

      - name: Mint an ID token for the lgbm revision
        id: idtoken_lgbm
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.urls.outputs.lgbm }}
          id_token_include_email: true

      - name: Smoke-test the lgbm revision before it sees a customer
        run: |
          set -uo pipefail
          URL="${{ steps.urls.outputs.lgbm }}/health"

          for TOKEN in "${{ steps.idtoken_base.outputs.id_token }}" \
                       "${{ steps.idtoken_lgbm.outputs.id_token }}"; do
            BODY="$(curl -s --retry 5 --retry-delay 3 --retry-connrefused \
              -H "Authorization: Bearer ${TOKEN}" "${URL}")"
            if echo "${BODY}" | grep -q '"status":"ok"'; then
              echo "${BODY}"
              echo "smoke test passed"
              exit 0
            fi
          done
          echo "smoke test FAILED: no audience produced a healthy response" >&2
          exit 1

      - name: Shift traffic per the A/B split
        run: |
          XGB="${{ github.event.inputs.xgboost_traffic || '50' }}"
          LGBM=$((100 - XGB))
          echo "splitting traffic: xgboost=${XGB}% lightgbm=${LGBM}%"
          gcloud run services update-traffic "${INFERENCE_SERVICE}" \
            --region="${{ vars.GCP_REGION }}" \
            --to-tags="xgb=${XGB},lgbm=${LGBM}" \
            --quiet

      # --- Monitoring service + its schedule ---

      - name: Deploy the drift monitor
        run: |
          gcloud run deploy "${MONITOR_SERVICE}" \
            --image="${{ steps.tags.outputs.monitor }}" \
            --region="${{ vars.GCP_REGION }}" \
            --set-env-vars="DRIFT_SOURCE=bigquery,GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GCP_REGION=${{ vars.GCP_REGION }},GCP_BUCKET_NAME=${{ vars.GCP_BUCKET_NAME }},BIGQUERY_DATASET=${{ vars.BIGQUERY_DATASET }},FEATURE_STORE_ID=${{ vars.FEATURE_STORE_ID }}" \
            --no-allow-unauthenticated \
            --memory=4Gi --cpu=2 --timeout=900 --max-instances=1 \
            --quiet

      - name: Provision the drift-check schedule
        # Calls our own tested, idempotent ensure_drift_check_job rather than a
        # hand-rolled `gcloud scheduler jobs create || update`.
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
          BIGQUERY_DATASET: ${{ vars.BIGQUERY_DATASET }}
          FEATURE_STORE_ID: ${{ vars.FEATURE_STORE_ID }}
        run: |
          MONITOR_URL="$(gcloud run services describe "${MONITOR_SERVICE}" \
            --region="${GCP_REGION}" --format='value(status.url)')"
          uv run python -m src.monitoring.scheduler \
            --target-uri="${MONITOR_URL}/drift-check" \
            --service-account="${{ secrets.SCHEDULER_SERVICE_ACCOUNT }}" \
            --job-name="${SCHEDULER_JOB}"

      - name: Summarise the deploy
        run: |
          URL="$(gcloud run services describe "${INFERENCE_SERVICE}" \
            --region="${{ vars.GCP_REGION }}" --format='value(status.url)')"
          {
            echo "### Deployed \`${GITHUB_SHA::7}\`"
            echo ""
            echo "| Service | URL |"
            echo "|---|---|"
            echo "| Inference | ${URL} |"
            echo "| Drift monitor | (private) |"
            echo ""
            echo "Traffic split: xgboost ${{ github.event.inputs.xgboost_traffic || '50' }}% / lightgbm the remainder."
          } >> "$GITHUB_STEP_SUMMARY"
